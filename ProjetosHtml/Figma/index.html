<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Favicon.png" type="image/x-icon">
    <title>Memoteca</title>
</head>
<body>
    <header>
        <div id="texto"><img src="Logo.svg" alt="logotipo" id="logo">
            <p>Trechos de músicas, citações de livros e <strong>suas melhores ideias num só lugar!</strong></p>
        </div>
        <img src="Colagem 1.png" alt="ilustração de computador">
    </header>

    <main>
        
        <h2>Adicione um pensamento novo:</h2>
        <section id="conteiner">
            <form id="form-pesamento">
                <label for="conteudo">Pensamento</label>
                <textarea id="conteudo" placeholder="Digite seu pensamento" required></textarea>

                <label for="autoria">Autor(a) ou Fonte</label>
                <input id="autoria" type="text" placeholder="Insira o nome do(a) autor(a) ou fonte." required></input>
                <button id="btn-adicionar">Adicionar</button>
            </form>
        </section>
        <img src="Imagens Background.png" alt="background">

    </main>

    <footer>
        <p>© 2024 Desenvolvido por Alura. Projeto fictício sem fins comerciais.</p>
    </footer>



    
</body>
</html>
