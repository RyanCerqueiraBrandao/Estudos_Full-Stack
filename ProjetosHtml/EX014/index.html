<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário DataMind Solutions</title>
    <link rel="icon" href="vm.ico" type="image/x-icon">
</head>

<body>

    <header>
        <img class="logo" src="vm.ico" alt="Logo da DataMind Solutions">
        <h1>DataMind Solutions</h1>

    </header>
     
    <main>
        <section class="conteiner">
            <h2>Pesquisa de Satisfação</h2>
            <p>Nos ajude a melhorar nossos serviços!</p>
            <form action="">
                <fieldset> <!-- agrupa os campos do formulário -->
                    
                    <legend>Dados Pessoais</legend><!-- Coloca legenda no fieldset-->
                    <label for="name">Nome </label>
                    <input type="text" id="name" name="name" placeholder="Digite seu nome">
                    
                    <label for="email">E-mail </label>
                    <input type="email" id="email" name="email" placeholder="E-mail">
                
                    <label for="age">Idade </label>
                    <input type="number" id="age" name="idade" min="1" max="100" required>
                    
                </fieldset>

                <fieldset>
                    
                    <legend>Avaliação</legend>
                    <label for="service">Como você avalia nosso serviço? </label> 
                    <div class="inline">
                        <input name="service" type ="radio"> Excelente
                        <input name="service" type="radio"> Bom
                        <input name="service" type="radio"> Regular
                        <input name="service" type="radio"> Ruim
                    </div>
                    <br><br>

                    <label>Quais Serviços você utilizou? </label>
                    <div class="inline">
                        <input id="site" type="checkbox"> 
                        <label for="site">Site</label>

                        <input id="aplicativo" type="checkbox"> 
                        <label for="aplicativo">Aplicativo</label>

                        <input id="atendimento" type="checkbox"> 
                        <label for="atendimento">Atendimento ao Cliente</label>
                        
                        <input id="entrega" type="checkbox">
                        <label for="entrega">Entrega</label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Informações Adicionais</legend>
                    <label >Estado</label>

                    <select name="estado" id="estado">
                        <option>Selecione</option>
                        <option>BA</option>
                        <option>SP</option>
                        <option>RJ</option>
                        <option>MG</option>
                        <option>RS</option>
                        </select>
                        <br>
                        
                    <label>Sugestões</label>
                    <textarea rows="1"></textarea>
                        <br>
                    <input type="checkbox">Receber novidades por e-mail

                </fieldset>


                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>

            </form>
        </section>
    </main>
</body>

</html>
