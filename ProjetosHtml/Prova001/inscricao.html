<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Experience 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="te-logo.ico" type="image/x-icon">
</head>
<body>
     <Header>
        <img src="te-logo.ico" alt="logo" class="logo">

        <div class="menu">
           
            <a href="index.html">início</a>
            <a href="inscricao.html">inscrição</a>
           <a href="sobre.html">sobre</a>
           
        </div>
        <h1>Inscrição para o Tech Experience 2026</h1>
    </Header>

    <main>
        <section>
            <form action="">
                <fieldset>

                    <legend>Dados Pessoais</legend>
                    <label for="name">Nome</label>
                    <input type="text" id="nome" placeholder="Didite seu nome">

                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="E-mail">

                    <label for="tel">Telefone</label>
                    <input type="number" id="tel" placeholder="Telefone">

                    <label for="date">Data de Nascimento</label>
                    <input type="date" id="data">
                
                </fieldset>
                    
                <fieldset>
                    <legend>Perfil</legend>
                    <label for="service">Você é:</label> 
                    <div class="inline">    
                            <input name="service" type ="radio"> Estudante
                            <input name="service" type="radio"> Professor
                            <input name="service" type="radio"> Profissional da área
                        </div>
                        
                        <label for="service">Áreas de interesse:</label>
                        <div class="inline">
                            <input name="service" type ="checkbox"> Frontend
                            <input name="service" type="checkbox"> Backend
                            <input name="service" type="checkbox"> Mobile
                            <input name="service" type="checkbox"> Dados
                        </div>
                </fieldset>
                <fieldset>
                    <legend>Localização</legend>
                            
                            <label for="text">Cidade:</label>
                            <input type="text" id="cidade" placeholder="Cidade">
                        
                        <label >Estado:</label>

                            <select name="estado" id="estado">
                                <option>Selecione</option>
                                <option>BA</option>
                                <option>SP</option>
                                <option>RJ</option>
                                <option>MG</option>
                                <option>RS</option>
                                <option>MT</option>
                                <option>AL</option>
                                <option>CE</option>
                                </select>
                                <br>
                    <label>Observações</label>
                            <textarea name="observacoes" id="obs"></textarea>

                    </fieldset>
                    <fieldset>        
                        <legend>Extras</legend>
                                <input type="checkbox" class="inline">Receber novidades por e-mail    

                    </fieldset>
                
                    <button type="submit">Finalizar Inscrição</button>
                    <button type="reset">Limpar Formulário</button>
            </form>
            </section>
    </main>
</body>
</html>
