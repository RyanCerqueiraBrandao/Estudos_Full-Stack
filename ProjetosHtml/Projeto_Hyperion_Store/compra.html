<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyperion Store | Simulacao de Compra</title>
  <link rel="icon" type="image/svg+xml" href="fav.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body class="page-compra">
  <header class="topbar">
    <a href="index.html" class="logo">HYPER<span>ION</span></a>
    <nav class="top-actions">
      <a href="index.html">Home</a>
      <a href="loja.html">Loja</a>
    </nav>
  </header>

  <main class="checkout">
    <section class="product-panel">
      <p class="panel-label">Produto Selecionado</p>
      <div class="product-card">
        <div class="product-image-wrap">
          <img id="productImage" src="" alt="Produto selecionado" />
        </div>
        <div class="product-info">
          <p class="brand" id="productBrand">Marca</p>
          <h1 id="productModel">Modelo</h1>
          <p class="unit-price" id="unitPrice">R$ 0</p>
        </div>
      </div>
    </section>

    <section class="checkout-panel">
      <p class="panel-label">Simulacao de Checkout</p>
      <form id="checkoutForm" class="checkout-form">
        <label>
          Tamanho
          <select id="size" required>
            <option value="">Selecione</option>
            <option>38</option>
            <option>39</option>
            <option>40</option>
            <option>41</option>
            <option>42</option>
            <option>43</option>
          </select>
        </label>

        <label>
          Quantidade
          <input id="quantity" type="number" min="1" max="5" value="1" required />
        </label>

        <label>
          CEP
          <input id="zip" type="text" placeholder="00000-000" required />
        </label>

        <label>
          Pagamento
          <select id="payment" required>
            <option value="">Selecione</option>
            <option>Cartao de credito</option>
            <option>Pix</option>
            <option>Boleto</option>
          </select>
        </label>

        <div class="summary">
          <p><span>Subtotal</span><strong id="subtotalValue">R$ 0</strong></p>
          <p><span>Frete</span><strong id="shippingValue">R$ 29</strong></p>
          <p class="total"><span>Total</span><strong id="totalValue">R$ 0</strong></p>
        </div>

        <button type="submit" class="confirm-btn">Finalizar Pedido (Simulacao)</button>
        <p id="statusMessage" class="status-message"></p>
      </form>
    </section>
  </main>
</body>
</html>
