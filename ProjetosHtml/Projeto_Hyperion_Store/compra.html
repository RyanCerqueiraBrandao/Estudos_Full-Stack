<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyperion Store | Simulação de Compra</title>
  <link rel="icon" type="image/svg+xml" href="fav.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body class="page-compra">

  <header class="topbar">
    <a href="index.html" class="logo">HYPER<span>ION</span></a>
    <nav class="top-actions">
      <a href="index.html">Home</a>
      <a href="loja.html">← Voltar à loja</a>
    </nav>
  </header>

  <div class="breadcrumb">
    <span>Loja</span>
    <span class="sep">›</span>
    <span>Produto</span>
    <span class="sep">›</span>
    <span class="current">Checkout</span>
  </div>

  <main class="checkout">

    <!-- LEFT: product -->
    <section class="product-panel">
      <p class="panel-label">Produto Selecionado</p>
      <div class="product-card">
        <div class="product-image-wrap">
          <img id="productImage" src="" alt="Produto selecionado" />
        </div>
        <div class="product-info">
          <p class="brand" id="productBrand">Marca</p>
          <h1 id="productModel">Modelo</h1>
          <p class="unit-price" id="unitPrice">R$ 0</p>
        </div>
      </div>
    </section>

    <!-- RIGHT: form -->
    <section class="checkout-panel">
      <p class="panel-label">Simulação de Checkout</p>

      <form id="checkoutForm" class="checkout-form">

        <div class="form-row">
          <label>
            Tamanho
            <select id="size" required>
              <option value="">Selecione</option>
              <option>35</option><option>36</option><option>37</option>
              <option>38</option><option>39</option><option>40</option>
              <option>41</option><option>42</option><option>43</option>
              <option>44</option><option>45</option>
            </select>
          </label>
          <label>
            Quantidade
            <input id="quantity" type="number" min="1" max="5" value="1" required />
          </label>
        </div>

        <label>
          Nome completo
          <input type="text" placeholder="João da Silva" required />
        </label>

        <label>
          E-mail
          <input type="email" placeholder="joao@email.com" required />
        </label>

        <div class="form-row">
          <label>
            CPF
            <input type="text" placeholder="000.000.000-00" required />
          </label>
          <label>
            Telefone
            <input type="tel" placeholder="(11) 90000-0000" />
          </label>
        </div>

        <label>
          CEP
          <input id="zip" type="text" placeholder="00000-000" required maxlength="9" />
        </label>

        <label>
          Endereço de entrega
          <input type="text" placeholder="Rua, número, complemento" required />
        </label>

        <label>
          Forma de Pagamento
          <select id="payment" required>
            <option value="">Selecione</option>
            <option>Cartão de crédito</option>
            <option>Pix</option>
            <option>Boleto</option>
          </select>
        </label>

        <!-- Card fields (shown only when credit card is selected) -->
        <div id="cardFields">
          <label>
            Número do cartão
            <input id="cardNumber" type="text" placeholder="0000 0000 0000 0000" maxlength="19" />
          </label>
          <div class="form-row">
            <label>
              Validade
              <input id="cardExpiry" type="text" placeholder="MM/AA" maxlength="5" />
            </label>
            <label>
              CVV
              <input id="cardCvv" type="text" placeholder="123" maxlength="4" />
            </label>
          </div>
          <label>
            Nome no cartão
            <input type="text" placeholder="NOME SOBRENOME" style="text-transform:uppercase;" />
          </label>
          <label>
            Parcelas
            <select>
              <option>1x sem juros</option>
              <option>2x sem juros</option>
              <option>3x sem juros</option>
              <option>6x sem juros</option>
              <option>12x sem juros</option>
            </select>
          </label>
        </div>

        <div class="summary">
          <p class="summary-title">Resumo do pedido</p>
          <p><span>Subtotal</span><strong id="subtotalValue">R$ 0</strong></p>
          <p><span>Frete</span><strong id="shippingValue">R$ 29</strong></p>
          <div class="summary-divider"></div>
          <p class="total"><span>Total</span><strong id="totalValue">R$ 0</strong></p>
        </div>

        <p id="pixHint"></p>

        <button type="submit" class="confirm-btn">Finalizar Pedido (Simulação)</button>
        <p id="statusMessage" class="status-message"></p>

        <div class="trust-row">
          <div class="trust-item">
            <div class="trust-icon">🔒</div>Compra segura
          </div>
          <div class="trust-item">
            <div class="trust-icon">↩</div>30 dias p/ troca
          </div>
          <div class="trust-item">
            <div class="trust-icon">✓</div>Original garantido
          </div>
          <div class="trust-item">
            <div class="trust-icon">🚚</div>Rastreio em tempo real
          </div>
        </div>

      </form>
    </section>
  </main>

</body>
</html>
